order = 3
what = "Implement did:web DID document generation in jobchain-core/src/did.rs — given a domain and public key, produce a JSON DID document with an Ed25519VerificationMethod"
why = "The DID document is the public key discovery mechanism for the entire system. When a verifier encounters a credential signed by did:web:discourse.org, they fetch https://discourse.org/.well-known/did.json to get the public key. This step produces that document. Without it, `jobchain init` can't output the file an org hosts at .well-known/did.json, and did:web resolution (step 7) has nothing to resolve to. Generating correct DID documents now also validates that the keypair's multibase encoding from step 2 integrates cleanly into the W3C DID spec format."

how = """
Step-by-step implementation plan:

1. Add dependencies to crates/jobchain-core/Cargo.toml (via workspace deps where possible):
   - serde = { version = "1", features = ["derive"] }
   - serde_json = "1"
   These should already be reserved in the workspace Cargo.toml from step 1; wire them into jobchain-core's [dependencies] with `workspace = true`.

2. Create crates/jobchain-core/src/did.rs and add `pub mod did;` to lib.rs.

3. Define a DidDocument struct with serde Serialize/Deserialize:
   Fields (matching W3C DID Core spec v1.0 for did:web):
   - @context: Vec<String> — always ["https://www.w3.org/ns/did/v1", "https://w3id.org/security/suites/ed25519-2020/v1"]
   - id: String — the DID URI, e.g. "did:web:discourse.org"
   - authentication: Vec<String> — references to verification methods, e.g. ["did:web:discourse.org#key-1"]
   - assertion_method: Vec<String> — same reference (issuer uses this key for signing credentials)
   - verification_method: Vec<VerificationMethod> — the actual key material
   Use #[serde(rename = "...")] for JSON field names that differ from Rust conventions:
   - @context → #[serde(rename = "@context")]
   - authentication, assertionMethod → #[serde(rename = "assertionMethod")]
   - verificationMethod → #[serde(rename = "verificationMethod")]

4. Define a VerificationMethod struct with serde Serialize/Deserialize:
   Fields (per Ed25519VerificationKey2020 spec):
   - id: String — "did:web:{domain}#key-1"
   - type_: String — always "Ed25519VerificationKey2020" (use #[serde(rename = "type")])
   - controller: String — same as the DID id, "did:web:{domain}"
   - public_key_multibase: String — multibase-encoded public key from Keypair::public_key_multibase() (use #[serde(rename = "publicKeyMultibase")])

5. Define a DidError enum using thiserror:
   - InvalidDomain(String) — domain contains characters that can't be used in a did:web URI
   - Serialization(#[from] serde_json::Error) — JSON serialization failure
   Use #[non_exhaustive] for future extensibility.

6. Implement a domain-to-DID-URI helper:
   - fn domain_to_did(domain: &str) -> Result<String, DidError>
   - Validates domain is non-empty, contains no whitespace, no fragments or query strings.
   - Converts colons in port numbers to %3A per did:web spec (e.g., "localhost:8080" → "did:web:localhost%3A8080").
   - Handles paths: "example.com/org/dept" → "did:web:example.com:org:dept" (slashes become colons).
   - Returns the full DID URI string.

7. Implement the main document builder:
   - pub fn generate_did_document(domain: &str, public_key: &[u8; 32]) -> Result<DidDocument, DidError>
   - Calls domain_to_did() to build the DID URI.
   - Constructs the multibase-encoded public key: prepend the multicodec ed25519-pub header bytes (0xed, 0x01) to the 32-byte public key, then base58btc-encode with 'z' prefix.
     NOTE: This duplicates the logic from Keypair::public_key_multibase() but accepts raw bytes so did.rs doesn't depend on the Keypair struct directly. This keeps the module usable with just a public key (important for verification/resolution flows where you don't have the private key).
   - Builds a VerificationMethod with id = "{did}#key-1", type = "Ed25519VerificationKey2020", controller = did, publicKeyMultibase = the encoded key.
   - Builds the DidDocument with the two @context URLs, id = did, authentication = ["{did}#key-1"], assertionMethod = ["{did}#key-1"], verificationMethod = [the method].
   - Returns the document (caller serializes to JSON as needed).

8. Implement a convenience serializer:
   - pub fn did_document_to_json(doc: &DidDocument) -> Result<String, DidError>
   - Uses serde_json::to_string_pretty() — the output goes in .well-known/did.json which humans will inspect.

9. Add base58 encoding support. Two options:
   - Use the bs58 crate (add bs58 = "0.5" to workspace deps and wire to jobchain-core).
   - This is the standard Rust crate for base58btc encoding, widely used and minimal.
   - The multibase 'z' prefix + bs58 encoding gives the correct multibase-base58btc format.

10. Write unit tests in did.rs (#[cfg(test)] mod tests):
    - test_domain_to_did_simple: "discourse.org" → "did:web:discourse.org"
    - test_domain_to_did_with_port: "localhost:8080" → "did:web:localhost%3A8080"
    - test_domain_to_did_with_path: "example.com/org/dept" → "did:web:example.com:org:dept"
    - test_domain_to_did_empty: "" → DidError::InvalidDomain
    - test_generate_did_document: generate with a known 32-byte key, assert:
      - doc.id == "did:web:discourse.org"
      - doc.verification_method has exactly 1 entry
      - verification method id == "did:web:discourse.org#key-1"
      - verification method type == "Ed25519VerificationKey2020"
      - publicKeyMultibase starts with 'z'
      - authentication and assertionMethod both reference "#key-1"
    - test_did_document_json_roundtrip: generate, serialize to JSON, deserialize back, assert equality.
    - test_did_document_json_structure: serialize to JSON, parse as serde_json::Value, assert:
      - has "@context" array with both expected URIs
      - has "verificationMethod" array
      - has "assertionMethod" and "authentication" arrays
      - field names are camelCase (not snake_case)
    - test_multibase_key_encoding: use a known test vector (32 zero bytes), encode, assert the multibase string starts with 'z' and has expected length.

11. Run `cargo test --workspace` and `cargo clippy --workspace` — must pass clean.
"""

backup = "If bs58 causes dependency issues, implement base58btc encoding manually (it's ~30 lines for encoding only, no decoding needed at this step) or use the multibase crate directly (multibase = '0.9') which handles the 'z' prefix automatically. If serde rename attributes for @context cause issues with the @ character, use a custom serializer or a BTreeMap<String, serde_json::Value> instead of a typed struct for the top-level document."

[context]
files = ["crates/jobchain-core/Cargo.toml", "crates/jobchain-core/src/lib.rs", "crates/jobchain-core/src/did.rs", "crates/jobchain-core/src/signing.rs", "Cargo.toml"]
dependencies = ["serde 1.x", "serde_json 1.x", "bs58 0.5", "thiserror 2.x"]
