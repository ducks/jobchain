order = 4
what = "Define W3C VC JSON subset types in jobchain-core/src/credential.rs — VerifiableCredential, CredentialSubject, and Proof structs that wrap jobl ExperienceItem as credentialSubject"
why = "The credential struct is the central data type everything else operates on: signing (step 5) serializes it, verification (step 6) deserializes it, amendments (step 8) extend it, and every CLI command either produces or consumes one. Defining it as a typed Rust struct with serde serialization locks in the JSON shape early so downstream steps can code against concrete types instead of raw serde_json::Value."

how = """
Step-by-step implementation plan:

1. Add dependencies to crates/jobchain-core/Cargo.toml via workspace deps:
   - serde = { version = "1", features = ["derive"] }
   - serde_json = "1"
   - jobl = "20251215" (the jobl crate, provides ExperienceItem)
   These should already be reserved in the workspace Cargo.toml from step 1; wire them into jobchain-core now.

2. Create crates/jobchain-core/src/credential.rs and declare `pub mod credential;` in lib.rs.

3. Define a Proof struct matching Ed25519Signature2020:
   - r#type: String — always "Ed25519Signature2020", use #[serde(rename = "type")]
   - verification_method: String — DID URI with fragment, e.g. "did:web:discourse.org#key-1", use #[serde(rename = "verificationMethod")]
   - proof_value: String — base58btc-encoded signature bytes, use #[serde(rename = "proofValue")]
   - created: String — ISO 8601 timestamp of when the proof was generated
   Derive Serialize, Deserialize, Debug, Clone, PartialEq.
   The Proof struct is Option<Proof> on the credential — it is None before signing and Some after.

4. Define a CredentialSubject struct that wraps jobl::ExperienceItem:
   - r#type: String — always "EmploymentRecord", use #[serde(rename = "type")]
   - Flatten the ExperienceItem fields into the subject using #[serde(flatten)] on an embedded jobl::ExperienceItem field.
   This produces JSON like { "type": "EmploymentRecord", "title": "...", "company": "...", ... } — the jobl fields appear as top-level properties of credentialSubject, not nested under an extra key.
   Derive Serialize, Deserialize, Debug, Clone, PartialEq.

5. Define the VerifiableCredential struct:
   - context: Vec<String> — use #[serde(rename = "@context")], default to ["https://www.w3.org/2018/credentials/v1"]
   - r#type: Vec<String> — use #[serde(rename = "type")], default to ["VerifiableCredential", "EmploymentCredential"]
   - issuer: String — a did:web URI, e.g. "did:web:discourse.org"
   - issuance_date: String — ISO 8601 date string, use #[serde(rename = "issuanceDate")]
   - credential_subject: CredentialSubject — use #[serde(rename = "credentialSubject")]
   - proof: Option<Proof> — None before signing, Some after; use #[serde(skip_serializing_if = "Option::is_none")]
   Derive Serialize, Deserialize, Debug, Clone, PartialEq.

6. Implement a builder-style constructor on VerifiableCredential:
   - VerifiableCredential::new(issuer: String, issuance_date: String, subject: jobl::ExperienceItem) -> Self
     Sets context and type to their defaults, wraps the ExperienceItem in a CredentialSubject with type = "EmploymentRecord", and sets proof to None.
   This keeps the default W3C boilerplate out of call sites while letting the signing step attach the proof later.

7. Implement a method for signing preparation:
   - VerifiableCredential::signing_payload(&self) -> Result<Vec<u8>, serde_json::Error>
     Clones self, sets proof to None, serializes to canonical JSON (sorted keys via serde_json::to_string with a custom serializer or by serializing to serde_json::Value first and relying on BTreeMap key ordering).
     Returns the bytes that get signed. This is what step 5 (credential-signing) will call.

8. Write unit tests in credential.rs (#[cfg(test)] mod tests):
   - test_new_credential: create a VerifiableCredential with a sample ExperienceItem, assert context, type, and issuer are correct, proof is None.
   - test_serialize_roundtrip: create a credential, serialize to JSON string, deserialize back, assert equality.
   - test_json_shape: serialize a credential, parse as serde_json::Value, assert the JSON keys match the W3C VC spec names (@context, type, issuer, issuanceDate, credentialSubject with flattened jobl fields, no proof key when None).
   - test_credential_with_proof: create a credential, attach a Proof, serialize, assert proof block appears in JSON with correct key names (type, verificationMethod, proofValue, created).
   - test_signing_payload_excludes_proof: create a credential with a proof attached, call signing_payload(), parse the result, assert no "proof" key exists.
   - test_credential_subject_flattens_experience: create a CredentialSubject from an ExperienceItem with technologies and highlights, serialize, assert the jobl fields are at the top level of credentialSubject (not nested under an "experience" key).

9. Run `cargo test --workspace` and `cargo clippy --workspace` — must pass clean.
"""

backup = "If the jobl crate's ExperienceItem does not derive Serialize/Deserialize (it does as of 20251215), define a local mirror struct with the same fields and a From<jobl::ExperienceItem> conversion. If #[serde(flatten)] produces unexpected JSON shape with ExperienceItem (e.g. key conflicts with the 'type' field), embed ExperienceItem under a named key like 'employment' instead of flattening, and adjust the JSON examples in PLAN.md to match."

[context]
files = ["crates/jobchain-core/Cargo.toml", "crates/jobchain-core/src/lib.rs", "crates/jobchain-core/src/credential.rs", "Cargo.toml"]
