  "crates/jobchain-cli/src/commands/issue.rs",
  "crates/jobchain-cli/src/commands/init.rs",
  "crates/jobchain-core/src/amendment.rs",
  "crates/jobchain-core/src/credential.rs",
  "crates/jobchain-core/src/signing.rs",
  "crates/jobchain-core/src/did.rs",
  "crates/jobchain-verify/src/lib.rs",
  "Cargo.toml",
]
dependencies = ["jobchain-core", "jobchain-verify", "serde_json 1.x", "chrono 0.4", "clap 4.x", "dirs 6.x", "anyhow 1.x", "assert_cmd 2.x (dev)", "predicates 3.x (dev)"]
