order = 5
what = "Implement credential issuance in jobchain-core/src/credential.rs — canonicalize a VerifiableCredential to deterministic JSON, sign the bytes with Ed25519 via the Keypair from signing.rs, and attach an Ed25519Signature2020 proof block"
why = "This is the step where the system actually produces a signed artifact. Steps 2 and 4 established the keypair and the credential struct independently; this step wires them together into the core issuance operation. Without it nothing is signed, and every downstream consumer — verification (step 6), amendments (step 8), the CLI issue command (step 11) — needs a real signed credential to work with. Getting canonicalization right here is critical because verification must reproduce the exact same bytes to check the signature."

how = """
Step-by-step implementation plan:

1. Add a sign method to the Keypair struct in crates/jobchain-core/src/signing.rs:
   - Keypair::sign(&self, message: &[u8]) -> Vec<u8>
     Calls self.signing_key.sign(message) via ed25519_dalek's Signer trait, returns the 64-byte signature as a Vec<u8>.
     This is a thin wrapper that keeps the signing_key private while exposing the sign operation.
   - Also add a standalone verification helper for use in tests:
     Keypair::verify(&self, message: &[u8], signature: &[u8]) -> Result<(), SigningError>
     Reconstructs the ed25519_dalek::Signature from the 64-byte slice and calls verifying_key.verify_strict(message, &sig).
     Returns Ok(()) on success, Err(SigningError::Signing(...)) on failure.

2. Implement canonical JSON serialization as a private helper in credential.rs:
   - fn canonicalize(value: &serde_json::Value) -> serde_json::Value
     Recursively walks a serde_json::Value:
       - Objects: collect entries into a BTreeMap<String, Value> (sorts keys lexicographically), recurse into values.
       - Arrays: recurse into each element, preserve order.
       - Primitives: return as-is.
     This guarantees deterministic key ordering regardless of struct field declaration order or HashMap iteration order.
   - Update VerifiableCredential::signing_payload(&self) to use this:
     Clone self, set proof to None, serialize to serde_json::Value via serde_json::to_value(),
     pass through canonicalize(), then serialize to compact JSON string via serde_json::to_string() (not to_string_pretty).
     Return the UTF-8 bytes as Vec<u8>.
     This produces sorted keys with no whitespace — the canonical form that both signing and verification use.

3. Implement the issuance function in credential.rs:
   - VerifiableCredential::sign(&mut self, keypair: &crate::signing::Keypair, verification_method: &str) -> Result<(), CredentialError>
     Where CredentialError is a new error enum (or extend an existing one) with variants:
       - Serialization(serde_json::Error) — canonicalization failed
       - Signing(crate::signing::SigningError) — Ed25519 sign/verify failed
     Steps:
       a. Call self.signing_payload() to get the canonical JSON bytes.
       b. Call keypair.sign(&payload) to get the 64-byte Ed25519 signature.
       c. Encode the signature as multibase base58btc: prepend 'z' to bs58::encode(&signature_bytes).into_string().
       d. Get the current UTC time as an ISO 8601 string (use chrono or manual formatting with std::time — prefer adding chrono as a dependency for correctness, or if avoiding deps use a simple UTC timestamp via SystemTime).
       e. Construct a Proof { type: "Ed25519Signature2020", verification_method: verification_method.to_string(), proof_value: <multibase-encoded-sig>, created: <iso8601-timestamp> }.
       f. Set self.proof = Some(proof).
     After this method returns, the credential is a complete signed W3C VC ready for serialization.

4. Add chrono as a workspace dependency for ISO 8601 timestamp generation:
   - In root Cargo.toml [workspace.dependencies]: chrono = { version = "0.4", default-features = false, features = ["std", "clock"] }
   - Wire into crates/jobchain-core/Cargo.toml: chrono = { workspace = true }
   - Use chrono::Utc::now().to_rfc3339_opts(chrono::SecondsFormat::Secs, true) for the proof.created timestamp.
   - This produces timestamps like "2024-03-15T10:30:00Z" — compact, unambiguous, W3C-compatible.

5. Add a convenience method for full credential construction and signing:
   - pub fn issue_credential(issuer_did: &str, experience: jobl::ExperienceItem, issuance_date: &str, keypair: &crate::signing::Keypair) -> Result<VerifiableCredential, CredentialError>
     Creates a new VerifiableCredential via VerifiableCredential::new(), signs it using keypair with verification_method set to "{issuer_did}#key-1",
     and returns the signed credential.
     This is the function the CLI issue command (step 11) will call.

6. Write unit tests in credential.rs (#[cfg(test)] mod tests) — add to existing tests from step 4:
   - test_canonical_json_sorted_keys: create a credential with known fields, call signing_payload(), parse the result, verify keys are alphabetically sorted at every nesting level.
   - test_canonical_json_no_whitespace: call signing_payload(), assert the result contains no newlines, no spaces between keys/values (except inside string values).
   - test_canonical_json_excludes_proof: create a credential, attach a dummy proof, call signing_payload(), assert no "proof" key in the output.
   - test_canonical_json_deterministic: call signing_payload() twice on the same credential, assert byte-equality.
   - test_sign_credential: generate a keypair, create a credential, call sign(), assert proof is Some with correct type and verificationMethod.
   - test_sign_proof_value_is_multibase: sign a credential, assert proof_value starts with 'z' and the remainder is valid base58.
   - test_sign_proof_created_is_iso8601: sign a credential, assert proof.created matches ISO 8601 format (regex or parse with chrono).
   - test_sign_then_verify_roundtrip: generate a keypair, sign a credential, extract the signature from proof_value (strip 'z', base58-decode), reconstruct the signing payload, verify the signature against the keypair's public key. This proves the canonical form is stable across sign and verify.
   - test_issue_credential_convenience: call issue_credential() with a sample ExperienceItem, assert returned credential has issuer, issuanceDate, credentialSubject, and a valid proof.
   - test_tampered_credential_fails_verify: sign a credential, modify a field (e.g. change the title), reconstruct the signing payload, attempt to verify the original signature — assert it fails.

7. Write unit tests in signing.rs (#[cfg(test)] mod tests) — add to existing tests from step 2:
   - test_sign_and_verify: generate a keypair, sign a message, verify it — assert Ok.
   - test_verify_wrong_message: sign message A, verify against message B — assert Err.
   - test_verify_wrong_key: sign with keypair A, verify with keypair B's public key — assert Err.

8. Run `cargo test --workspace` and `cargo clippy --workspace` — must pass clean.
"""

backup = "If chrono is rejected as too heavy a dependency, use std::time::SystemTime::now().duration_since(UNIX_EPOCH) and format the UTC timestamp manually as 'YYYY-MM-DDTHH:MM:SSZ' using basic arithmetic — this avoids the chrono dependency but is more error-prone. If the canonicalize function produces unexpected ordering with serde_json::Value (e.g. serde_json internally uses a BTreeMap already on some versions), skip the explicit BTreeMap re-sorting and just rely on serde_json::to_value() + to_string() — but verify in tests that key order is deterministic. If bs58 encoding does not match what verification expects, switch to using the multibase crate directly instead of manual 'z' prefix + bs58."

