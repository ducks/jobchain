files = ["crates/jobchain-core/src/adapter.rs", "crates/jobchain-core/src/lib.rs", "crates/jobchain-core/src/credential.rs", "crates/jobchain-core/src/amendment.rs"]
dependencies = ["jobl 20251215", "serde_json 1.x", "thiserror 2.x"]
